var AC=null,masterGain=null,musicOn=true,nodes=[];function initAudio(){safe(function(){var C=window.AudioContext||window.webkitAudioContext;if(!C)return;if(!AC){AC=new C();masterGain=AC.createGain();masterGain.gain.value=musicOn?.16:0;masterGain.connect(AC.destination);[42,55,71,86].forEach(function(f,i){var o=AC.createOscillator(),g=AC.createGain(),fi=AC.createBiquadFilter();o.type=i%2?'triangle':'sine';o.frequency.value=f;fi.type='lowpass';fi.frequency.value=180+i*60;g.gain.value=.035-i*.004;o.connect(fi);fi.connect(g);g.connect(masterGain);o.start();nodes.push(o)})}if(AC.state==='suspended')AC.resume().catch(function(){})})}
